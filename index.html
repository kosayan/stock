<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0d0f14" />
<title>在庫 & 原価マネージャー</title>
<style>
  :root{
    color-scheme:dark;
    --bg:#0d0f14; --panel:#14171f; --line:rgba(255,255,255,.07);
    --txt:#f1f5f9; --sub:#aab2c0; --faint:#7a8290;
    --cyan:#22d3ee; --emerald:#6ee7b7; --pink:#f472b6; --amber:#fbbf24;
  }
  html{background:#0d0f14}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;min-height:100dvh;background:#0d0f14;color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    padding-bottom:env(safe-area-inset-bottom)}
  body::before{content:"";position:fixed;inset:0;background:#0d0f14;z-index:-1}
  .num{font-variant-numeric:tabular-nums}
  header{position:sticky;top:0;z-index:20;background:rgba(13,15,20,.85);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px}
  .hrow{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .logo{width:32px;height:32px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--cyan),#c026d3);display:grid;place-items:center;
    color:#0d0f14;font-weight:800}
  h1{font-size:17px;margin:0;font-weight:700}
  .hsub{font-size:12px;color:var(--faint);margin-top:2px}
  main{max-width:720px;margin:0 auto;padding:16px}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
  .stat{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:12px}
  .stat .l{font-size:12px;color:var(--sub);margin-bottom:5px}
  .stat .v{font-size:19px;font-weight:700}
  .stat .v.zero{color:var(--faint);opacity:.7}
  .substats{display:flex;gap:16px;margin:-6px 0 14px;padding:0 3px;
    font-size:12px;color:var(--faint)}
  .substats b{color:var(--sub);font-weight:700}
  .btn{border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
  .btn-primary{background:var(--cyan);color:#0d0f14;height:36px;padding:0 14px}
  .btn-primary:active{background:#67e8f9}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--txt);height:40px;flex:1}
  .btn-ghost:active{background:rgba(255,255,255,.05)}
  .btn-ghost2{background:transparent;border:1px solid var(--line);color:var(--txt);height:36px;width:40px;font-size:16px}
  .btn-ghost2:active{background:rgba(255,255,255,.05)}
  .pcard{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;margin-bottom:10px;animation:fi .2s ease both;position:relative}
  @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.pcard,.sheet{animation:none}}
  /* ---- 商品ヘッダ（親） ---- */
  .phead{display:flex;gap:12px;align-items:center;padding:14px 14px 14px 16px;cursor:pointer;
    background:linear-gradient(90deg,rgba(34,211,238,.07),rgba(34,211,238,0) 45%);
    border-left:3px solid var(--cyan)}
  .pcard.open .phead{border-bottom:1px solid var(--line)}
  .thumb{width:46px;height:46px;border-radius:10px;flex:0 0 auto;object-fit:cover;
    background:linear-gradient(135deg,#232a38,#2f3648);display:grid;place-items:center;
    color:var(--faint);font-size:18px}
  .pinfo{flex:1;min-width:0}
  .pname{font-weight:800;font-size:18px;color:#fff;line-height:1.25;letter-spacing:.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pmeta{font-size:11.5px;color:var(--faint);margin-top:4px;letter-spacing:.04em}
  .pright{margin-left:auto;text-align:right;flex:0 0 auto}
  .pval{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.01em}
  .pvlab{font-size:10px;color:var(--faint);margin-top:2px;letter-spacing:.05em}
  .caret{color:var(--faint);font-size:11px;margin-left:6px;background:none;border:none;flex:0 0 auto}
  .iconbtn{width:30px;height:30px;border-radius:8px;border:none;background:rgba(255,255,255,.05);
    color:var(--faint);cursor:pointer;font-size:13px;display:grid;place-items:center;flex:0 0 auto}
  .iconbtn:active{background:rgba(255,255,255,.12)}
  /* ---- バリアント（子）: 階層を下げる ---- */
  .vlist{background:rgba(0,0,0,.22);padding-left:14px}
  .vrow{border-left:2px solid rgba(255,255,255,.09);padding:12px 13px 12px 14px;
    border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px}
  .vrow:last-of-type{border-bottom:none}
  .vleft{min-width:0;flex:1}
  .vlabel{font-weight:700;font-size:14.5px;color:var(--sub);line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vlabel::before{content:"└ ";color:var(--faint);font-weight:400}
  .vchips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
  .chip{font-size:11px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,.06);
    color:var(--sub);font-variant-numeric:tabular-nums}
  .chip.zero{color:var(--faint);opacity:.6}
  .chip.low{background:rgba(244,114,182,.15);color:var(--pink)}
  .chip.warn{background:rgba(251,191,36,.15);color:var(--amber)}
  .chip.good{background:rgba(110,231,183,.13);color:var(--emerald)}
  .vright{text-align:right;flex:0 0 auto}
  .vprice{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.01em;line-height:1.15}
  .vpsub{font-size:11px;color:var(--faint);margin-top:3px}
  .vacts{display:flex;flex-direction:column;gap:5px;flex:0 0 auto}
  .vbe{padding:0 13px 12px 30px;font-size:11.5px;color:var(--sub);
    border-left:2px solid rgba(255,255,255,.09);margin-left:0;background:rgba(0,0,0,0)}
  .zero{color:var(--faint);opacity:.6}
  .addv{width:100%;padding:12px;background:none;border:none;border-top:1px solid var(--line);
    color:var(--cyan);font-size:13px;cursor:pointer;font-weight:700}
  .addv:active{background:rgba(255,255,255,.04)}
  /* ---- toolbar ---- */
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .search{flex:1;height:40px;border-radius:10px;background:rgba(255,255,255,.05);
    border:1px solid var(--line);color:var(--txt);padding:0 12px;font-size:15px;outline:none}
  .search:focus{border-color:rgba(34,211,238,.5)}
  .sortbtn{height:40px;padding:0 12px;border-radius:10px;background:rgba(255,255,255,.05);
    border:1px solid var(--line);color:var(--sub);font-size:12.5px;white-space:nowrap;cursor:pointer}
  .sortbtn:active{background:rgba(255,255,255,.1)}
  /* ---- status ---- */
  /* stepper in variant editor */
  .stepper{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;
    padding:6px;margin-bottom:12px}
  .step{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer}
  .step:active{background:rgba(255,255,255,.05)}
  .step .box{width:22px;height:22px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;
    border:1.5px solid rgba(255,255,255,.22);font-size:12px;color:transparent;background:transparent}
  .step.done .box{background:var(--emerald);border-color:var(--emerald);color:#0d0f14;font-weight:900}
  .step.cur .box{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.15)}
  .step .nm{font-size:14px;color:var(--sub);flex:1}
  .step.done .nm{color:var(--faint);text-decoration:line-through}
  .step.cur .nm{color:var(--cyan);font-weight:800}
  .step .tag{font-size:10px;color:var(--cyan);font-weight:800}
  /* status settings list */
  .sedit{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .sedit input{flex:1;height:40px}
  .sedit .ord{color:var(--faint);font-size:12px;width:18px;text-align:center;flex:0 0 auto}
  .filterbar{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;
    -webkit-overflow-scrolling:touch}
  .fchip{flex:0 0 auto;font-size:12px;padding:7px 12px;border-radius:20px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--sub);white-space:nowrap}
  .fchip.on{background:rgba(34,211,238,.15);border-color:rgba(34,211,238,.4);color:var(--cyan);font-weight:700}
  /* ---- 進捗の遅れを色で示す（赤=遅れ / 黄=進行中 / 緑=完了） ---- */
  .pcard{border-left:3px solid var(--prog,#64748b)}
  .phead{border-left:none !important;
    background:linear-gradient(90deg,var(--progbg,rgba(148,163,184,.06)),rgba(0,0,0,0) 50%)}
  .pstatus{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
  .pst{font-size:12.5px;padding:4px 10px;border-radius:20px;font-weight:800;white-space:nowrap;
    background:var(--c-bg);color:var(--c-fg);border:1px solid var(--c-bd);
    display:inline-flex;align-items:center;gap:5px}
  .pst.tappable{cursor:pointer}
  .pst.tappable:active{filter:brightness(1.35)}
  .pst .n{opacity:.65;font-weight:700}
  /* mini progress bar under product name */
  .pbar{height:4px;border-radius:20px;background:rgba(255,255,255,.07);
    overflow:hidden;margin-top:8px;display:flex}
  .pbar i{height:100%;display:block;background:var(--prog,#64748b)}
  /* ---- ステータスチップ（頭のチェックボックスで次へ進む） ---- */
  .stchip{font-size:13px;padding:6px 12px 6px 7px;border-radius:20px;font-weight:800;
    background:var(--c-bg);color:var(--c-fg);border:1px solid var(--c-bd);
    display:inline-flex;align-items:center;gap:8px;white-space:nowrap;cursor:pointer}
  .stchip:active{filter:brightness(1.3)}
  .stbox{width:20px;height:20px;border-radius:6px;flex:0 0 auto;display:grid;place-items:center;
    border:1.5px solid currentColor;background:rgba(0,0,0,.25);
    font-size:12px;font-weight:900;color:transparent;transition:.12s}
  .stchip:active .stbox{background:currentColor;color:#0d0f14}
  .stchip.done{cursor:default}
  .stchip.done .stbox{background:currentColor;color:#0d0f14}
  .stnext{font-size:10.5px;font-weight:600;opacity:.6;margin-left:2px}
  /* 商品ヘッダの一括進行 */
  .bulkbtn{border:none;border-radius:9px;padding:7px 11px;font-size:11.5px;font-weight:800;
    background:rgba(255,255,255,.07);color:var(--sub);border:1px solid var(--line);
    cursor:pointer;white-space:nowrap;margin-top:8px}
  .bulkbtn:active{background:rgba(255,255,255,.14)}
  /* 数値クイック編集 */
  .qty{display:flex;align-items:center;gap:5px;margin-top:8px}
  .qbtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--line);flex:0 0 auto;
    background:rgba(255,255,255,.05);color:var(--sub);font-size:15px;font-weight:800;cursor:pointer}
  .qbtn:active{background:rgba(255,255,255,.14)}
  .qin{width:50px;height:28px;border-radius:7px;border:1px solid var(--line);text-align:center;
    background:rgba(255,255,255,.05);color:var(--txt);font-size:13px;font-weight:700;
    font-variant-numeric:tabular-nums;-webkit-appearance:none;padding:0}
  .qlab{font-size:10.5px;color:var(--faint);flex:0 0 auto}
  /* トースト */
  .toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));
    transform:translateX(-50%);z-index:60;background:#1c2130;border:1px solid var(--line);
    color:var(--txt);padding:11px 16px;border-radius:12px;font-size:13px;font-weight:700;
    box-shadow:0 8px 30px rgba(0,0,0,.5);display:flex;align-items:center;gap:12px;
    animation:tin .2s ease both;max-width:calc(100% - 32px)}
  @keyframes tin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  .toast button{background:none;border:none;color:var(--cyan);font-weight:800;font-size:13px;
    cursor:pointer;flex:0 0 auto}
  .empty{border:1px dashed rgba(255,255,255,.12);border-radius:14px;padding:56px 20px;text-align:center;color:var(--sub)}
  .empty .big{font-size:30px;margin-bottom:10px}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
    z-index:40;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:560px){.backdrop{align-items:center}}
  .sheet{background:var(--panel);border:1px solid rgba(255,255,255,.1);
    border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
    padding:20px;animation:up .22s ease both;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
  @media(min-width:560px){.sheet{border-radius:20px}}
  @keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
  .shead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .shead h2{font-size:16px;margin:0}
  .field{display:block;margin-bottom:12px}
  .field .lab{font-size:11px;color:var(--faint);margin-bottom:5px;display:block}
  input[type=text],input[type=number]{width:100%;height:42px;padding:0 12px;border-radius:10px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--txt);
    font-size:15px;outline:none;-webkit-appearance:none}
  input:focus{border-color:rgba(34,211,238,.5)}
  input::placeholder{color:var(--faint)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .imgpick{width:100%;height:120px;border-radius:12px;border:1px dashed rgba(255,255,255,.14);
    background:rgba(255,255,255,.03);display:grid;place-items:center;color:var(--sub);
    cursor:pointer;overflow:hidden;margin-bottom:12px;position:relative}
  .imgpick img{width:100%;height:100%;object-fit:cover}
  .imgpick .rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;color:#fff;
    width:28px;height:28px;border-radius:8px;font-size:15px}
  .calcbox{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;
    padding:12px;margin:4px 0 12px}
  .crow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
  .crow .l{color:var(--sub)} .crow .v{font-weight:600}
  .actions{display:flex;gap:10px;margin-top:8px}
  .hint{font-size:11px;color:var(--faint);margin:-6px 0 12px;line-height:1.5}
  .pink{color:var(--pink)} .cyan{color:var(--cyan)} .emerald{color:var(--emerald)} .amber{color:var(--amber)}
  .divlab{font-size:11px;color:var(--faint);margin:14px 0 8px;border-top:1px solid var(--line);padding-top:12px}
  input.auto{color:var(--cyan);background:rgba(34,211,238,.06);border-color:rgba(34,211,238,.2)}
  .autotag{font-size:10px;color:var(--cyan);margin-left:6px}
  .pricebtn{width:100%;height:40px;border-radius:10px;background:rgba(34,211,238,.08);
    border:1px solid rgba(34,211,238,.28);color:var(--cyan);font-size:13.5px;font-weight:700;
    margin-bottom:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .pricebtn:active{background:rgba(34,211,238,.16)}
  .pricebtn:disabled{opacity:.4;cursor:default}
  .pghead{font-size:13.5px;color:var(--sub);margin-bottom:14px;line-height:1.5}
  .pglist{display:flex;flex-direction:column;gap:8px}
  .prow{display:grid;grid-template-columns:auto 1fr;grid-template-areas:"rate price" "sub sub";
    gap:3px 10px;text-align:left;padding:13px 15px;border-radius:12px;width:100%;
    background:rgba(255,255,255,.04);border:1px solid var(--line);cursor:pointer}
  .prow:active{background:rgba(34,211,238,.12)}
  .pr-rate{grid-area:rate;align-self:center;font-size:15px;font-weight:700}
  .pr-price{grid-area:price;text-align:right;font-size:21px;font-weight:800;color:#f8fafc}
  .pr-sub{grid-area:sub;font-size:12.5px;color:var(--sub)}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="logo">在</div>
    <div style="margin-right:auto">
      <h1>在庫 &amp; 原価マネージャー</h1>
      <div class="hsub num" id="hsub">0 商品</div>
    </div>
    <button class="btn btn-ghost2" id="setBtn" title="バックアップ">⚙</button>
    <button class="btn btn-primary" id="addBtn">＋ 商品</button>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat"><div class="l">在庫金額（原価）</div><div class="v num emerald" id="sStockVal">¥0</div></div>
    <div class="stat"><div class="l">総売上</div><div class="v num" id="sRev">¥0</div></div>
    <div class="stat"><div class="l">総利益</div><div class="v num cyan" id="sProfit">¥0</div></div>
  </div>
  <div class="substats">
    <span>在庫 <b class="num" id="sStock">0</b> 点</span>
    <span>売れば <b class="num" id="sPotential">¥0</b>（売価ベース）</span>
  </div>
  <div class="toolbar">
    <input class="search" id="q" placeholder="🔍 商品名・サイズで検索">
    <button class="sortbtn" id="sortBtn">利益順 ▾</button>
  </div>
  <div class="filterbar" id="filterbar"></div>
  <div id="list"></div>
</main>

<script>
/* ---------- IndexedDB ---------- */
const DB="inv-mgr", STORE="products";
function db(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(STORE,{keyPath:"id"});
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});}
async function idbAll(){const d=await db();return new Promise((res,rej)=>{
  const t=d.transaction(STORE).objectStore(STORE).getAll();
  t.onsuccess=()=>res(t.result||[]); t.onerror=()=>rej(t.error);});}
async function idbPut(o){const d=await db();return new Promise((res,rej)=>{
  const t=d.transaction(STORE,"readwrite").objectStore(STORE).put(o);
  t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);});}
async function idbDel(id){const d=await db();return new Promise((res,rej)=>{
  const t=d.transaction(STORE,"readwrite").objectStore(STORE).delete(id);
  t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);});}

/* ---------- helpers ---------- */
const yen=n=>isFinite(n)?"¥"+Math.round(n).toLocaleString("ja-JP"):"¥0";
const pct=n=>isFinite(n)?Math.round(n*1000)/10+"%":"—";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const $=s=>document.querySelector(s);
const num=v=>{const n=parseFloat(v);return isFinite(n)?n:null;};
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

let products=[];
const expanded={};

/* ---------- 全体共通ステータス（工程） ---------- */
const DEFAULT_STAGES=[
  "生産待ち","生産中","発送待ち","到着待ち",
  "ページ制作待ち","在庫・詳細入力待ち","販売中"
];
let stages=[...DEFAULT_STAGES];
let filterStage=null; // null = すべて

function loadStages(){
  try{
    const raw=localStorage.getItem("inv-mgr:stages");
    if(raw){const a=JSON.parse(raw);
      if(Array.isArray(a)&&a.length)stages=a;}
  }catch(e){}
}
function saveStages(){
  try{localStorage.setItem("inv-mgr:stages",JSON.stringify(stages));}catch(e){}
}
// v.stage = 完了した工程数（0 = 何も終わってない＝最初の工程が現在地）
const curStageIdx=v=>Math.min(+v.stage||0, stages.length);
const stageName=v=>{const i=curStageIdx(v);
  return i>=stages.length?"完了":stages[i];};
const isComplete=v=>curStageIdx(v)>=stages.length;

/* 進捗率(0=未着手 … 1=完了) */
const vProg=v=>stages.length?curStageIdx(v)/stages.length:0;
// 商品の進捗＝一番遅れているバリアント（遅れを埋もれさせない）
function pProg(p){
  if(!p.variants.length)return 0;
  return Math.min(...p.variants.map(vProg));
}

/* ---- 相対評価で色を決める ----
   全商品を出荷する前提なので、絶対的な工程位置ではなく
   「他と比べて遅れているか」で色を出す。
   全体が同じ進捗なら差が無い＝全部同じ色（オレンジ〜黄）になる。 */
let progScale={min:0,max:0};
function updateProgScale(){
  const ps=products.filter(p=>p.variants.length).map(pProg);
  progScale = ps.length
    ? {min:Math.min(...ps), max:Math.max(...ps)}
    : {min:0,max:0};
}
// 相対位置 → 0(最も遅れ) 〜 1(最も進んでいる)
function relPos(t){
  const {min,max}=progScale;
  const span=max-min;
  if(span<0.001)return 0.5;  // 全員横並び → 中間色（オレンジ〜黄）
  const r=(t-min)/span;
  // 差が小さいときは色の振れ幅も抑える（1工程差で真っ赤にならないように）
  // span=1工程分なら±0.5程度、大きく開くほどフルレンジに近づく
  const spread=Math.min(1, span*2);
  return 0.5 + (r-0.5)*spread;
}
/* 相対位置 → 色。0=赤 / 0.5=オレンジ〜黄 / 1=黄緑。完了だけ緑 */
function progColor(t,done){
  if(done)return {fg:"#6ee7b7",bg:"rgba(110,231,183,.13)",bd:"rgba(110,231,183,.3)"};
  const r=Math.max(0,Math.min(1,relPos(t)));
  const hue=Math.round(r*75);   // 0=赤 → 37=オレンジ/黄 → 75=黄緑
  return {
    fg:`hsl(${hue},92%,66%)`,
    bg:`hsla(${hue},92%,60%,.14)`,
    bd:`hsla(${hue},92%,60%,.32)`
  };
}

/* ---------- variant math ---------- */
function vcalc(v){
  const cost=+v.cost||0, price=+v.price||0, qty=+v.qty||0;
  const orderQty=+v.orderQty||0, orderTotal=+v.order||0;
  const total=(v.total!=="" && v.total!=null)? +v.total : price*qty;
  const stock=orderQty-qty;
  const profit=total-cost*qty;
  const orderCost=orderTotal>0?orderTotal:cost*orderQty;
  const breakEven=price>0?Math.ceil(orderCost/price):NaN;
  const net=price*qty-orderCost;
  return {cost,price,qty,orderQty,total,stock,profit,orderCost,breakEven,net};
}

/* ---------- render ---------- */
const SORTS=[
  {k:"delay", label:"遅れ順"},
  {k:"profit",label:"利益順"},
  {k:"stockval",label:"在庫金額順"},
  {k:"stock",  label:"在庫少順"},
  {k:"name",  label:"名前順"},
];
let sortIdx=0;
let query="";

function psum(p){
  let profit=0,stock=0,rev=0,stockVal=0;
  p.variants.forEach(v=>{const c=vcalc(v);
    profit+=c.profit;stock+=c.stock;rev+=c.total;
    stockVal+=c.cost*Math.max(0,c.stock);});
  return {profit,stock,rev,stockVal};
}

function renderFilters(){
  const bar=$("#filterbar");
  const counts={};
  products.forEach(p=>p.variants.forEach(v=>{
    const k=isComplete(v)?"__done":curStageIdx(v);
    counts[k]=(counts[k]||0)+1;}));
  let html=`<button class="fchip ${filterStage===null?'on':''}" data-s="">すべて</button>`;
  stages.forEach((s,i)=>{
    const n=counts[i]||0;
    html+=`<button class="fchip ${filterStage===i?'on':''}" data-s="${i}">${esc(s)}${n?` ${n}`:""}</button>`;
  });
  const dn=counts["__done"]||0;
  html+=`<button class="fchip ${filterStage==="__done"?'on':''}" data-s="__done">完了${dn?` ${dn}`:""}</button>`;
  bar.innerHTML=html;
  bar.querySelectorAll(".fchip").forEach(b=>b.onclick=()=>{
    const s=b.dataset.s;
    filterStage = s===""?null : s==="__done"?"__done":+s;
    render();
  });
}

function visibleProducts(){
  const q=query.trim().toLowerCase();
  let arr=products.map(p=>{
    let vs=p.variants;
    if(filterStage!==null){
      vs=vs.filter(v=>filterStage==="__done"
        ? isComplete(v)
        : (!isComplete(v)&&curStageIdx(v)===filterStage));
      if(!vs.length)return null;
    }
    if(q){
      if((p.name||"").toLowerCase().includes(q))return {...p,variants:vs};
      const hit=vs.filter(v=>(v.label||"").toLowerCase().includes(q));
      return hit.length?{...p,variants:hit}:null;
    }
    return vs===p.variants?p:{...p,variants:vs};
  }).filter(Boolean);

  const s=SORTS[sortIdx].k;
  arr=[...arr].sort((x,y)=>{
    if(s==="delay"){
      const d=pProg(x)-pProg(y);
      if(d!==0)return d;                        // 遅れているものが先頭
      return (x.name||"").localeCompare(y.name||"","ja");
    }
    if(s==="name")return (x.name||"").localeCompare(y.name||"","ja");
    if(s==="stock")return psum(x).stock-psum(y).stock;
    if(s==="stockval")return psum(y).stockVal-psum(x).stockVal;
    return psum(y).profit-psum(x).profit;
  });
  return arr;
}

function render(){
  $("#hsub").textContent=products.length+" 商品";
  let rev=0,profit=0,stock=0,stockVal=0,potential=0;
  products.forEach(p=>p.variants.forEach(v=>{const c=vcalc(v);
    rev+=c.total; profit+=c.profit; stock+=c.stock;
    stockVal+=c.cost*Math.max(0,c.stock);
    potential+=c.price*Math.max(0,c.stock);}));
  $("#sStockVal").textContent=yen(stockVal);
  $("#sStockVal").className="v num "+(stockVal>0?"emerald":"zero");
  $("#sRev").textContent=yen(rev);
  $("#sRev").className="v num "+(rev>0?"":"zero");
  $("#sProfit").textContent=yen(profit);
  $("#sProfit").className="v num "+(profit<0?"pink":profit>0?"cyan":"zero");
  $("#sStock").textContent=stock;
  $("#sPotential").textContent=yen(potential);
  $("#sortBtn").textContent=SORTS[sortIdx].label+" ▾";
  updateProgScale();
  renderFilters();

  const list=$("#list");
  if(!products.length){
    list.innerHTML='<div class="empty"><div class="big">📦</div>まだ商品がありません<br><br>'+
      '<button class="btn btn-primary" onclick="editProduct()">＋ 最初の商品を追加</button></div>';
    return;
  }
  const shown=visibleProducts();
  if(!shown.length){
    list.innerHTML='<div class="empty">該当する商品がありません</div>';
    return;
  }

  list.innerHTML="";
  shown.forEach(p=>{
    const s=psum(p);
    const open=!!expanded[p.id];
    const card=document.createElement("div");
    card.className="pcard"+(open?" open":"");

    // --- 進捗の色（他商品との相対評価） ---
    const t=pProg(p);
    const allDone=p.variants.length>0 && p.variants.every(isComplete);
    const col=progColor(t,allDone);
    card.style.setProperty("--prog",col.fg);
    card.style.setProperty("--progbg",col.bg);

    // --- 閉じていても見えるステータス表示 ---
    const byStage=new Map();
    p.variants.forEach(v=>{
      const i=isComplete(v)?stages.length:curStageIdx(v);
      byStage.set(i,(byStage.get(i)||0)+1);
    });
    const stChips=[...byStage.entries()].sort((a,b)=>a[0]-b[0]).map(([i,n])=>{
      const done=i>=stages.length;
      const c=progColor(stages.length?i/stages.length:0, done);
      const nm=done?"完了":stages[i];
      const tap=done?"":` data-adv="${i}"`;
      return `<span class="pst${done?'':' tappable'}"${tap} style="--c-fg:${c.fg};--c-bg:${c.bg};--c-bd:${c.bd}">
        ${done?"✓ ":"☐ "}${esc(nm)}${p.variants.length>1?`<span class="n">${n}</span>`:""}</span>`;
    }).join("");

    const thumb=p.image?`<img class="thumb" src="${p.image}">`:`<div class="thumb">📦</div>`;
    const headVal = s.profit!==0 ? yen(s.profit) : yen(s.stockVal);
    const headLab = s.profit!==0 ? "利益" : "在庫金額";
    const headCls = s.profit<0?"pink":s.profit>0?"cyan":(s.stockVal>0?"":"zero");
    const pending=p.variants.filter(v=>(+v.stage||0)<stages.length);
    const bulk = pending.length>1
      ? `<button class="bulkbtn" data-a="bulk">☑ ${pending.length}件まとめて進める</button>`
      : "";
    card.innerHTML=`
      <div class="phead">
        ${thumb}
        <div class="pinfo">
          <div class="pname">${esc(p.name||"（無名）")}</div>
          <div class="pstatus">${stChips}</div>
          <div class="pbar"><i style="width:${Math.round(t*100)}%"></i></div>
          <div class="pmeta num">${p.variants.length}種 ・ 在庫 ${s.stock}点</div>
          ${bulk}
        </div>
        <div class="pright">
          <div class="pval num ${headCls}">${headVal}</div>
          <div class="pvlab">${headLab}</div>
        </div>
        <span class="caret">${open?"▾":"▸"}</span>
      </div>`;
    const bb=card.querySelector('[data-a="bulk"]');
    if(bb)bb.onclick=e=>{e.stopPropagation();advanceProduct(p);};
    card.querySelectorAll("[data-adv]").forEach(el=>{
      el.onclick=e=>{e.stopPropagation();advanceStage(p,+el.dataset.adv);};
    });
    card.querySelector(".phead").onclick=()=>{expanded[p.id]=!open;saveExpanded();render();};

    if(open){
      const wrap=document.createElement("div");wrap.className="vlist";
      p.variants.forEach(v=>{
        const c=vcalc(v);
        const invVal=c.cost*Math.max(0,c.stock);         // この行の在庫金額
        const hasOrder=c.orderQty>0;
        const stockChip = !hasOrder
          ? `<span class="chip zero">在庫 —</span>`
          : c.stock<=0 ? `<span class="chip low">在庫 0</span>`
          : c.stock<=5 ? `<span class="chip warn">在庫 ${c.stock}</span>`
          : `<span class="chip good">在庫 ${c.stock}</span>`;
        const costChip = c.cost>0?`<span class="chip">原価 ${yen(c.cost)}</span>`:"";
        const profitChip = c.profit!==0
          ? `<span class="chip ${c.profit<0?'low':'good'}">利益 ${yen(c.profit)}</span>`:"";

        const row=document.createElement("div");row.className="vrow";
        const vc=progColor(vProg(v), isComplete(v));
        const done=isComplete(v);
        const nextName=done?null:(curStageIdx(v)+1>=stages.length?"完了":stages[curStageIdx(v)+1]);
        // 現在地のチップ。頭のチェックボックスを押すと次の工程へ。
        const stChip=done
          ? `<span class="stchip done" style="--c-bg:${vc.bg};--c-fg:${vc.fg};--c-bd:${vc.bd}">
               <span class="stbox">✓</span>完了</span>`
          : `<span class="stchip" data-a="next" style="--c-bg:${vc.bg};--c-fg:${vc.fg};--c-bd:${vc.bd}">
               <span class="stbox">✓</span>${esc(stageName(v))}
               <span class="stnext">→ ${esc(nextName)}</span></span>`;

        row.innerHTML=`
          <div class="vleft">
            <div class="vlabel">${esc(v.label||"（無名）")}</div>
            <div class="vchips">${stChip}</div>
            <div class="qty">
              <span class="qlab">発注</span>
              <button class="qbtn" data-q="orderQty" data-d="-10">−</button>
              <input class="qin" type="number" inputmode="numeric" data-f="orderQty" value="${c.orderQty||0}">
              <button class="qbtn" data-q="orderQty" data-d="10">＋</button>
              <span class="qlab" style="margin-left:8px">販売</span>
              <button class="qbtn" data-q="qty" data-d="-1">−</button>
              <input class="qin" type="number" inputmode="numeric" data-f="qty" value="${c.qty||0}">
              <button class="qbtn" data-q="qty" data-d="1">＋</button>
            </div>
            <div class="vchips" style="margin-top:8px">${stockChip}${costChip}${profitChip}</div>
          </div>
          <div class="vright">
            <div class="vprice num ${c.price>0?'':'zero'}">${c.price>0?yen(c.price):"—"}</div>
            <div class="vpsub num">${invVal>0?`在庫 ${yen(invVal)}`:"売価"}</div>
          </div>
          <div class="vacts">
            <button class="iconbtn" data-a="ev">✎</button>
            <button class="iconbtn" data-a="dv">🗑</button>
          </div>`;
        const nb=row.querySelector('[data-a="next"]');
        if(nb)nb.onclick=e=>{e.stopPropagation();advanceVariant(p,v);};
        row.querySelectorAll("[data-q]").forEach(b=>b.onclick=e=>{e.stopPropagation();
          bumpQty(p,v,b.dataset.q,+b.dataset.d);});
        row.querySelectorAll("[data-f]").forEach(inp=>{
          inp.onclick=e=>e.stopPropagation();
          inp.onchange=e=>{e.stopPropagation();setQty(p,v,inp.dataset.f,inp.value);};
        });
        row.querySelector('[data-a="ev"]').onclick=e=>{e.stopPropagation();editVariant(p,v);};
        row.querySelector('[data-a="dv"]').onclick=e=>{e.stopPropagation();
          if(confirm(`「${v.label||"このバリアント"}」を削除しますか？`))delVariant(p,v.id);};
        wrap.appendChild(row);

        if(isFinite(c.breakEven)&&c.orderCost>0){
          const be=document.createElement("div");be.className="vbe num";
          be.innerHTML = c.qty>=c.breakEven
            ? `<span class="emerald">✓ 黒字化済み</span> ・ 純益 <b class="emerald">${yen(c.net)}</b>`
            : `黒字ライン <b class="amber">${c.breakEven}個</b>（あと ${c.breakEven-c.qty}個）・ 投資 ${yen(c.orderCost)}`;
          wrap.appendChild(be);
        }
      });
      card.appendChild(wrap);

      const bar=document.createElement("div");
      bar.style.cssText="display:flex;border-top:1px solid var(--line)";
      const add=document.createElement("button");add.className="addv";
      add.textContent="＋ サイズ / カラー";
      add.onclick=e=>{e.stopPropagation();editVariant(p,null);};
      const ep=document.createElement("button");ep.className="addv";
      ep.style.cssText="border-left:1px solid var(--line);color:var(--sub)";
      ep.textContent="✎ 商品を編集";
      ep.onclick=e=>{e.stopPropagation();editProduct(p);};
      const dp=document.createElement("button");dp.className="addv";
      dp.style.cssText="border-left:1px solid var(--line);color:var(--faint);flex:0 0 56px";
      dp.textContent="🗑";
      dp.onclick=e=>{e.stopPropagation();
        if(confirm(`「${p.name||"この商品"}」を削除しますか？`))delProduct(p.id);};
      bar.append(add,ep,dp);
      card.appendChild(bar);
    }
    list.appendChild(card);
  });
}

/* toolbar wiring */
function saveExpanded(){
  try{localStorage.setItem("inv-mgr:expanded",JSON.stringify(expanded));}catch(e){}
}
function loadExpanded(){
  try{Object.assign(expanded,JSON.parse(localStorage.getItem("inv-mgr:expanded")||"{}"));}catch(e){}
}

/* ---------- mutations ---------- */
async function persist(p){const i=products.findIndex(x=>x.id===p.id);
  if(i>=0)products[i]=p; else products.push(p); await idbPut(p);}
async function delProduct(id){products=products.filter(p=>p.id!==id);await idbDel(id);render();}
async function delVariant(p,vid){p.variants=p.variants.filter(v=>v.id!==vid);await persist(p);render();}

/* ---------- ステータス進行（一覧から直接） ---------- */
let toastEl=null;
function toast(msg,undo){
  if(toastEl)toastEl.remove();
  toastEl=document.createElement("div");
  toastEl.className="toast";
  toastEl.innerHTML=`<span>${esc(msg)}</span>`;
  if(undo){
    const b=document.createElement("button");
    b.textContent="取り消し";
    b.onclick=()=>{undo();toastEl.remove();toastEl=null;};
    toastEl.appendChild(b);
  }
  document.body.appendChild(toastEl);
  const el=toastEl;
  setTimeout(()=>{if(el===toastEl){el.remove();toastEl=null;}},4000);
}

// 1バリアントを次の工程へ
async function advanceVariant(p,v){
  const before=+v.stage||0;
  if(before>=stages.length)return;
  v.stage=before+1;
  await persist(p); render();
  const nm=v.stage>=stages.length?"完了":stages[v.stage];
  toast(`${v.label||"バリアント"} → ${nm}`,async()=>{
    v.stage=before; await persist(p); render();
  });
}

// 指定した工程にいるバリアントだけを次へ（閉じた状態のチップから）
async function advanceStage(p,stageIdx){
  const targets=p.variants.filter(v=>(+v.stage||0)===stageIdx && stageIdx<stages.length);
  if(!targets.length)return;
  const before=p.variants.map(v=>+v.stage||0);
  targets.forEach(v=>{v.stage=stageIdx+1;});
  await persist(p); render();
  const nm=stageIdx+1>=stages.length?"完了":stages[stageIdx+1];
  toast(`${targets.length}件 → ${nm}`,async()=>{
    p.variants.forEach((v,i)=>{v.stage=before[i];});
    await persist(p); render();
  });
}

// 商品内の全バリアントをまとめて次へ（一番遅れているものに合わせて全部進める）
async function advanceProduct(p){
  const targets=p.variants.filter(v=>(+v.stage||0)<stages.length);
  if(!targets.length)return;
  const before=p.variants.map(v=>+v.stage||0);
  targets.forEach(v=>{v.stage=(+v.stage||0)+1;});
  await persist(p); render();
  toast(`${p.name||"商品"} の ${targets.length}件を進めました`,async()=>{
    p.variants.forEach((v,i)=>{v.stage=before[i];});
    await persist(p); render();
  });
}

// 在庫・販売数のクイック編集
async function bumpQty(p,v,field,delta){
  const cur=+v[field]||0;
  v[field]=Math.max(0,cur+delta);
  await persist(p); render();
}
async function setQty(p,v,field,val){
  v[field]=Math.max(0,+val||0);
  await persist(p); render();
}

    <div class="actions">
      <button class="btn btn-ghost" id="cancel">キャンセル</button>
      <button class="btn btn-primary" style="flex:1;height:40px" id="save">保存</button>
    </div>`);

  const g=id=>back.querySelector("#"+id);
  const F={price:g("f_price"),qty:g("f_qty"),total:g("f_total")};

  /* 進捗ステッパー：一直線。チェックで次へ進む */
  d.stage = +d.stage || 0;
  function drawStepper(){
    const cur=Math.min(d.stage, stages.length);
    g("stepper").innerHTML = stages.map((s,i)=>{
      const done=i<cur;
      const isCur=i===cur;
      return `<div class="step ${done?'done':''} ${isCur?'cur':''}" data-i="${i}">
        <div class="box">✓</div>
        <div class="nm">${esc(s)}</div>
        ${isCur?'<span class="tag">現在</span>':''}
      </div>`;}).join("")
      + (cur>=stages.length?'<div class="step done"><div class="box">✓</div><div class="nm">すべて完了</div></div>':'');
    g("stepper").querySelectorAll(".step[data-i]").forEach(el=>{
      el.onclick=()=>{
        const i=+el.dataset.i;
        // その工程が完了済みなら「そこまで戻す」、未完了なら「そこまで完了にする」
        d.stage = (i < d.stage) ? i : i+1;
        drawStepper();
      };
    });
  }
  drawStepper();

  function readCur(){return {
    cost:num(g("f_cost").value)||0, price:num(F.price.value)||0,
    qty:num(F.qty.value)||0, orderQty:num(g("f_orderQty").value)||0,
    order:num(g("f_order").value)||0, total:num(F.total.value)};}

  function triangle(){
    const target=order[order.length-1];
    const others=order.filter(k=>k!==target);
    if(target==="total"){
      const a=num(F.price.value),b=num(F.qty.value);
      if(a!==null&&b!==null)F.total.value=Math.round(a*b*100)/100;
    }else{
      const total=num(F.total.value), other=num(F[others.find(k=>k!=="total")].value);
      if(total!==null&&other)F[target].value=Math.round(total/other*100)/100;
    }
  }
  function refresh(){
    const c=readCur();
    const total=c.total!=null?c.total:c.price*c.qty;
    const stock=c.orderQty-c.qty;
    const profit=total-c.cost*c.qty;
    const orderCost=c.order>0?c.order:c.cost*c.orderQty;
    const be=c.price>0?Math.ceil(orderCost/c.price):NaN;
    const net=c.price*c.qty-orderCost;
    g("c_stock").textContent=stock;
    g("c_profit").textContent=yen(profit);
    g("c_profit").className="v num "+(profit<0?"pink":"cyan");
    g("c_be").textContent=isFinite(be)?be+"個":"—";
    g("c_be").className="v num "+(isFinite(be)&&c.qty>=be?"emerald":"amber");
    g("c_net").textContent=yen(net);
    g("c_net").className="v num "+(net<0?"pink":"emerald");
    const tp=num(g("f_tprofit").value);
    if(tp!==null&&c.price>0)g("f_treq").value=Math.ceil((tp+orderCost)/c.price)+"個";
    else g("f_treq").value="";
  }
  // 原価 = 発注価格 ÷ 発注個数（両方あれば自動・入力不可）
  function recalcCost(){
    const oq=num(g("f_orderQty").value), ot=num(g("f_order").value), ce=g("f_cost");
    if(oq&&ot&&oq>0){ce.value=Math.round(ot/oq*100)/100;ce.readOnly=true;ce.classList.add("auto");}
    else{ce.readOnly=false;ce.classList.remove("auto");}
  }
  recalcCost();

  ["price","qty","total"].forEach(k=>F[k].addEventListener("input",()=>{
    order=[k,...order.filter(x=>x!==k)];triangle();refresh();}));
  ["f_orderQty","f_order"].forEach(id=>g(id).addEventListener("input",()=>{recalcCost();refresh();}));
  ["f_cost","f_tprofit"].forEach(id=>g(id).addEventListener("input",refresh));
  refresh();

  g("priceGuide").onclick=()=>{
    const c=readCur();
    const cost=(c.orderQty>0&&c.order>0)?c.order/c.orderQty:c.cost;
    const orderCost=c.order>0?c.order:cost*c.orderQty;
    if(!cost||cost<=0){alert("先に原価、または発注価格＋発注個数を入れてください。");return;}
    openPricing(Math.round(cost*100)/100,orderCost,price=>{
      F.price.value=price; order=["price","qty","total"]; triangle(); refresh();
    });
  };

  g("cancel").onclick=()=>back.remove();
  g("save").onclick=async()=>{
    d.label=g("f_label").value.trim();
    d.cost=num(g("f_cost").value)||0;
    d.order=num(g("f_order").value)||0;
    d.orderQty=num(g("f_orderQty").value)||0;
    d.price=num(F.price.value)||0;
    d.qty=num(F.qty.value)||0;
    d.total=F.total.value===""?"":(num(F.total.value)||0);
    d.stage=+d.stage||0;
    if(!d.label && !d.orderQty && !d.qty){back.remove();return;}
    const i=p.variants.findIndex(x=>x.id===d.id);
    if(i>=0)p.variants[i]=d; else p.variants.push(d);
    await persist(p); expanded[p.id]=true; render(); back.remove();
  };
}

/* ---------- backup (export / import) ---------- */
function openSettings(){
  const back=mkSheet("設定",`
    <button class="btn btn-primary" id="stg" style="width:100%;height:46px;margin-bottom:10px;background:rgba(34,211,238,.14);color:var(--cyan);border:1px solid rgba(34,211,238,.35)">⚙ 進捗ステータス（工程）を編集</button>
    <button class="btn btn-ghost" id="upd" style="width:100%;height:46px;margin-bottom:16px">🔄 アプリを最新に更新</button>
    <div class="divlab" style="margin-top:0">バックアップ</div>
    <div class="hint" style="margin:0 0 14px;font-size:12.5px;line-height:1.6">
      データはこの端末のブラウザ内（IndexedDB）だけに保存されています。<br>
      機種変更・アプリ削除・ブラウザのデータ消去で消えるので、ときどき書き出して保管してください。</div>
    <button class="btn btn-primary" id="exp" style="width:100%;height:46px;margin-bottom:10px">⬇ バックアップを書き出す</button>
    <label class="btn btn-ghost" id="impLbl" style="width:100%;height:46px">⬆ バックアップから復元
      <input type="file" accept="application/json,.json" id="impFile" hidden></label>
    <div class="hint" style="margin-top:14px;font-size:11.5px">復元すると、同じ商品は上書き・無い商品は追加されます（今のデータは消えません）。</div>`);
  back.querySelector("#stg").onclick=()=>{back.remove();openStages();};
  back.querySelector("#upd").onclick=async()=>{
    const btn=back.querySelector("#upd");
    btn.textContent="更新中…"; btn.disabled=true;
    try{
      if("caches" in window){
        const keys=await caches.keys();
        await Promise.all(keys.map(k=>caches.delete(k)));
      }
      if("serviceWorker" in navigator){
        const regs=await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r=>r.unregister()));
      }
    }catch(e){}
    location.reload(true);
  };
  back.querySelector("#exp").onclick=exportData;
  back.querySelector("#impFile").onchange=e=>{
    const f=e.target.files[0]; if(f)importData(f,back);};
}

/* ---------- 工程の編集（全商品共通） ---------- */
function openStages(){
  let draft=[...stages];
  const back=mkSheet("進捗ステータス（工程）",`
    <div class="hint" style="margin:0 0 14px;font-size:12.5px;line-height:1.6">
      ここで決めた工程が<b>すべての商品・サイズ共通</b>で使われます。上から順に進みます。</div>
    <div id="slist"></div>
    <button class="btn btn-ghost" id="addStage" style="width:100%;height:42px;margin-top:6px">＋ 工程を追加</button>
    <div class="actions" style="margin-top:16px">
      <button class="btn btn-ghost" id="cancel">キャンセル</button>
      <button class="btn btn-primary" style="flex:1;height:42px" id="save">保存</button>
    </div>`);
  const g=id=>back.querySelector("#"+id);
  function draw(){
    g("slist").innerHTML=draft.map((s,i)=>`
      <div class="sedit">
        <span class="ord">${i+1}</span>
        <input type="text" value="${esc(s)}" data-i="${i}">
        <button class="iconbtn" data-up="${i}">↑</button>
        <button class="iconbtn" data-del="${i}">🗑</button>
      </div>`).join("");
    g("slist").querySelectorAll("input[data-i]").forEach(inp=>
      inp.oninput=()=>{draft[+inp.dataset.i]=inp.value;});
    g("slist").querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.up; if(i===0)return;
      [draft[i-1],draft[i]]=[draft[i],draft[i-1]]; draw();});
    g("slist").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.del;
      if(draft.length<=1){alert("工程は最低1つ必要です。");return;}
      draft.splice(i,1); draw();});
  }
  draw();
  g("addStage").onclick=()=>{draft.push("新しい工程");draw();};
  g("cancel").onclick=()=>back.remove();
  g("save").onclick=()=>{
    const clean=draft.map(s=>s.trim()).filter(Boolean);
    if(!clean.length){alert("工程は最低1つ必要です。");return;}
    stages=clean; saveStages(); filterStage=null; render(); back.remove();
  };
}
function exportData(){
  const payload={app:"inv-mgr",version:2,exportedAt:new Date().toISOString(),stages,products};
  const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="inventory-backup-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
async function importData(file,back){
  try{
    const parsed=JSON.parse(await file.text());
    const arr=Array.isArray(parsed)?parsed:parsed.products;
    if(!Array.isArray(arr))throw new Error("bad");
    if(!confirm(`${arr.length}件を取り込みます。よろしいですか？`))return;
    if(Array.isArray(parsed.stages)&&parsed.stages.length){
      stages=parsed.stages; saveStages();
    }
    for(const p of arr){
      const prod=Array.isArray(p.variants)
        ? {id:p.id||uid(),name:p.name||"",image:p.image||"",variants:p.variants}
        : {id:p.id||uid(),name:p.name||"",image:p.image||"",variants:[]};
      const i=products.findIndex(x=>x.id===prod.id);
      if(i>=0)products[i]=prod; else products.push(prod);
      await idbPut(prod);
    }
    render();
    if(back)back.remove();
    alert("取り込みが完了しました。");
  }catch(e){
    alert("ファイルを読み込めませんでした。JSONが壊れている可能性があります。");
  }
}

/* ---------- pricing guide ---------- */
function openPricing(cost,orderCost,onPick){
  const rates=[20,25,30,33,40,50,60,70];
  const tone=r=>r<=30?"cyan":r<=40?"emerald":r<=50?"amber":"pink";
  const rows=rates.map(r=>{
    const price=Math.round(cost/(r/100));
    const margin=price-cost;
    const be=orderCost>0?Math.ceil(orderCost/price):null;
    return `<button class="prow" data-price="${price}">
      <span class="pr-rate ${tone(r)}">原価率 ${r}%</span>
      <span class="pr-price num">${yen(price)}</span>
      <span class="pr-sub num">粗利 ${yen(margin)}/個${be!=null?` ・ 黒字ライン ${be}個`:""}</span>
    </button>`;
  }).join("");
  const back=mkSheet("価格の目安",`
    <div class="pghead num">原価 <b style="color:var(--txt)">${yen(cost)}</b>${orderCost>0?` ・ 投資額 ${yen(orderCost)}`:""}<br>
      原価率から販売価格を逆算しています。行をタップすると販売価格に反映。</div>
    <div class="pglist">${rows}</div>`);
  back.querySelectorAll(".prow").forEach(b=>b.onclick=()=>{onPick(+b.dataset.price);back.remove();});
}

/* ---------- sheet + image utils ---------- */
function mkSheet(title,inner){
  const back=document.createElement("div");back.className="backdrop";
  back.innerHTML=`<div class="sheet"><div class="shead"><h2>${title}</h2>
    <button class="iconbtn" id="x">✕</button></div>${inner}</div>`;
  document.body.appendChild(back);
  back.querySelector(".sheet").onclick=e=>e.stopPropagation();
  back.onclick=()=>back.remove();
  back.querySelector("#x").onclick=()=>back.remove();
  return back;
}
function attachImage(back,d){
  const pick=back.querySelector("#imgpick");
  if(!pick)return;
  const bindFile=()=>{
    const inp=back.querySelector("#imgfile");
    inp.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const rd=new FileReader();
      rd.onload=()=>{const img=new Image();img.onload=()=>{
        const max=512,sc=Math.min(1,max/Math.max(img.width,img.height));
        const cv=document.createElement("canvas");cv.width=img.width*sc;cv.height=img.height*sc;
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        d.image=cv.toDataURL("image/jpeg",0.72);
        pick.innerHTML=`<img src="${d.image}"><button class="rm" id="imgrm">✕</button>`+
          '<input type="file" accept="image/*" id="imgfile" hidden>';
        bindRm();bindFile();
      };img.src=rd.result;};
      rd.readAsDataURL(file);
    };
  };
  const bindRm=()=>{const rm=back.querySelector("#imgrm");if(!rm)return;
    rm.onclick=ev=>{ev.preventDefault();ev.stopPropagation();d.image="";
      pick.innerHTML='＋ 画像を追加<input type="file" accept="image/*" id="imgfile" hidden>';
      bindFile();};};
  bindFile();bindRm();
}
window.editProduct=editProduct;
$("#addBtn").onclick=()=>editProduct();
$("#setBtn").onclick=openSettings;
$("#q").addEventListener("input",e=>{query=e.target.value;render();});
$("#sortBtn").onclick=()=>{sortIdx=(sortIdx+1)%SORTS.length;render();};

/* ---------- boot + migrate flat -> two-tier ---------- */
(async()=>{
  const raw=await idbAll();
  let changed=false;
  products=raw.map(r=>{
    if(Array.isArray(r.variants))return r;
    changed=true;
    return {id:r.id,name:r.name||"",image:r.image||"",variants:[{
      id:uid(),label:"",cost:r.cost||0,order:r.order||0,orderQty:r.qty||0,
      price:r.price||0,qty:r.qty||0,total:r.total||0
    }]};
  });
  if(changed)for(const p of products)await idbPut(p);
  loadStages();
  loadExpanded();
  render();
})();

/* ---------- offline: service worker ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
